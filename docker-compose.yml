services:
  rd-mcp-server:
    build: .
    container_name: rd-mcp-server
    ports:
      - "${RD_SERVER_PORT:-3000}:${RD_SERVER_PORT:-3000}"
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - RD_API_TOKEN=${RD_API_TOKEN}
      - RD_API_BASE_URL=${RD_API_BASE_URL:-https://dashboard.researchanddesire.com/api/v1}
      - RD_SERVER_PORT=${RD_SERVER_PORT:-3000}
      - RD_SERVER_HOST=0.0.0.0
    restart: unless-stopped
